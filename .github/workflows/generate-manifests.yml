name: Generate Manifests

on:
  workflow_dispatch:
  schedule:
    - cron: "0 22 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-manifests
  cancel-in-progress: false

env:
  COMMUNITY_DIR: community
  OFFICIAL_DIR: official

jobs:

  prepare:
    name: Prepare Branch

    runs-on: ubuntu-latest
    steps:
      - id: vars
        run: |
          echo "branch=bot/generate-manifests-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

    outputs:
      branch: ${{ steps.vars.outputs.branch }}

  generate:
    name: "${{ matrix.url }}"
    needs: prepare
    timeout-minutes: 10

    strategy:
      max-parallel: 3   # To avoid GitHub API rate limit
      fail-fast: true

      # DO NOT forget to update url prefixes list
      # NOTE: 'https://github.com/' is prepended if not starting with 'https://'
      matrix:
        url:
          - anthropics/skills/tree/main/skills
          - github/awesome-copilot/tree/main/agents
          - github/awesome-copilot/tree/main/skills
          - dotnet/skills/tree/main/plugins/dotnet/skills
          - dotnet/skills/tree/main/plugins/dotnet-diag/agents
          - dotnet/skills/tree/main/plugins/dotnet-diag/skills
          - dotnet/skills/tree/main/plugins/dotnet-test/agents
          - dotnet/skills/tree/main/plugins/dotnet-test/skills
          - garrytan/gstack
          - mattpocock/skills/tree/main/skills
          ## Obsolete - obra/superpowers/tree/main/agents
          - obra/superpowers/tree/main/skills
          - addyosmani/agent-skills/tree/main/agents
          - addyosmani/agent-skills/tree/main/skills
          - nextlevelbuilder/ui-ux-pro-max-skill/tree/main/.claude/skills
          - ComposioHQ/awesome-claude-skills/tree/master
          - runceel/ai-dev-template/tree/main/.github/skills
          - runceel/ai-dev-template/tree/main/.github/agents
          - vercel-labs/agent-skills/tree/main/skills
          - openai/skills/tree/main/skills/.curated
          - openai/skills/tree/main/skills/.system
          - Kotlin/kotlin-agent-skills/tree/main/skills
          - figma/mcp-server-guide/tree/main/skills
          - cloudflare/skills/tree/main/skills
          - browser-use/browser-use/tree/main/skills
          - firebase/agent-skills/tree/main/skills
          - facebook/react/tree/main/.claude/skills
          - google-gemini/gemini-cli/tree/main/.gemini/skills
          - google-labs-code/stitch-skills/tree/main/plugins
          - google-labs-code/design.md/tree/main/examples
          - VoltAgent/awesome-design-md/tree/ef729b271802ce7ed50f9e0928137b18942cde80/design-md
          - kzhrknt/awesome-design-md-jp/tree/main/design-md
          - android/skills
          - sator-imaging/suggest-skills/tree/main/Unity
          - warpdotdev/oz-skills/tree/main/.agents/skills
          - vercel-labs/emulate/tree/main/skills
          - aws/agent-toolkit-for-aws/tree/main/skills
          - anthropics/claude-for-legal
          - anthropics/knowledge-work-plugins
          - multica-ai/andrej-karpathy-skills
          - GoogleChrome/modern-web-guidance/tree/main/skills
          - NousResearch/hermes-agent/tree/main/skills
          - steipete/agent-scripts/tree/main/skills
          - google/skills
    env:
      # DO NOT forget add '/' at the end
      OFFICIAL_URL_PREFIXES: |
        ### NOTE: DO NOT include 'github/'
        ###       --> 'github/awesome-copilot' is an official, but community-managed skills registry.
        ###github/
        anthropics/
        dotnet/
        vercel-labs/
        openai/
        Kotlin/
        figma/
        cloudflare/
        browser-use/
        firebase/
        facebook/
        google-gemini/
        google-labs-code/
        android/
        aws/
        GoogleChrome/
        google/
      RECURSIVE_URL_PREFIXES: |
        android/skills
        aws/agent-toolkit-for-aws/tree/main/skills
        anthropics/claude-for-legal
        anthropics/knowledge-work-plugins
        mattpocock/skills/tree/main/skills
        google-labs-code/stitch-skills/tree/main/plugins
        multica-ai/andrej-karpathy-skills
        NousResearch/hermes-agent/tree/main/skills
        google/skills
      GENERATED_DIR: generate/${{ strategy.job-index }}
      BRANCH: ${{ needs.prepare.outputs.branch }}

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install ###--production ###--frozen-lockfile

      - name: Switch to target branch
        run: |
          set -euo pipefail

          git fetch origin "$BRANCH" || true

          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

      - name: Generate and classify manifest files
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_PAT || github.token }}
          SOURCE_URL: ${{ matrix.url }}
          WORKDIR: ${{ runner.temp }}/${{ env.GENERATED_DIR }}
        run: |
          set -euo pipefail

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          raw_source_url="$SOURCE_URL"

          if [[ "$SOURCE_URL" != https://* ]]; then
            SOURCE_URL="https://github.com/$SOURCE_URL"
          fi

          generate_args=(generate "$SOURCE_URL")
          while IFS= read -r prefix; do
            [[ -n "$prefix" ]] || continue
            if [[ "$raw_source_url" == "$prefix"* ]]; then
              generate_args=(generate --recursive "$SOURCE_URL")
              break
            fi
          done <<< "$RECURSIVE_URL_PREFIXES"

          bun "$GITHUB_WORKSPACE/src/index.ts" "${generate_args[@]}"

          output_root="$COMMUNITY_DIR"
          while IFS= read -r prefix; do
            [[ -n "$prefix" ]] || continue
            if [[ "$raw_source_url" == "$prefix"* ]]; then
              output_root="$OFFICIAL_DIR"
              break
            fi
          done <<< "$OFFICIAL_URL_PREFIXES"

          mkdir -p "$output_root"/agents
          mkdir -p "$output_root"/skills
          mkdir -p "$output_root"/designs
          shopt -s nullglob
          mv ./*.agents.md "$output_root"/agents/ || true
          mv ./*.skills.md "$output_root"/skills/ || true
          mv ./*.designs.md "$output_root"/designs/ || true
          shopt -u nullglob

      - name: Update repository files
        env:
          WORKDIR: ${{ runner.temp }}/${{ env.GENERATED_DIR }}
        run: |
          set -euo pipefail

          mkdir -p "$COMMUNITY_DIR"/agents
          mkdir -p "$COMMUNITY_DIR"/skills
          mkdir -p "$COMMUNITY_DIR"/designs
          mkdir -p "$OFFICIAL_DIR"/agents
          mkdir -p "$OFFICIAL_DIR"/skills
          mkdir -p "$OFFICIAL_DIR"/designs

          cp -R "$WORKDIR"/"$COMMUNITY_DIR"/. "$COMMUNITY_DIR"/ 2>/dev/null || true
          cp -R "$WORKDIR"/"$OFFICIAL_DIR"/. "$OFFICIAL_DIR"/ 2>/dev/null || true

      - name: Commit and push with retry
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f "$COMMUNITY_DIR"/agents
          git add -f "$COMMUNITY_DIR"/skills
          git add -f "$COMMUNITY_DIR"/designs
          git add -f "$OFFICIAL_DIR"/agents
          git add -f "$OFFICIAL_DIR"/skills
          git add -f "$OFFICIAL_DIR"/designs

          git commit -m "[bot] ${{ matrix.url }}" || {
            echo "No changes to commit."
            exit 0
          }

          echo "================================"
          git status -sb
          git diff --name-only
          git restore .
          echo "================================"

          for i in 1 2 3 4 5 6 7 8 9; do
            git fetch origin "$BRANCH" || true

            if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
              git rebase "origin/$BRANCH"
            fi

            if git push --set-upstream origin "$BRANCH"; then
              exit 0
            fi

            git rebase --abort || true
            sleep $((i * 3))
          done

          exit 1

  scan:
    name: Security Scan
    needs: 
      - prepare  # For needs.outputs
      - generate
    uses: ./.github/workflows/skillspector.yml
    with:
      branch: ${{ needs.prepare.outputs.branch }}
    permissions:
      contents: write
      pull-requests: write
      security-events: write

  collect-and-pr:
    name: Collect Skills & Create PR
    needs:
      - prepare  # For needs.outputs
      - scan

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Collect Skills
        run: |
          set -euo pipefail

          BRANCH_NAME="${{ needs.prepare.outputs.branch }}"

          git fetch origin main
          git fetch origin "$BRANCH_NAME" \
            || exit 0  # No changes
          git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"

          # Create and commit

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          for BASE_DIR in "$COMMUNITY_DIR" "$OFFICIAL_DIR"; do
            for SUB_DIR in agents skills designs; do
              TARGET_DIR="$BASE_DIR/$SUB_DIR"
              ALL_MD="$BASE_DIR/$BASE_DIR-$SUB_DIR.md"

              rm -f "$ALL_MD"

              find "$TARGET_DIR" -maxdepth 1 -type f -name "*.md" | while IFS= read -r MD_FILE; do
                FILENAME="$(basename "$MD_FILE")"

                # NOTE: Large files are placed BEFORE others,
                #       as AI prioritize later context.
                PRIORITY=1
                LINE_COUNT=$(wc -l < "$MD_FILE")
                if (( LINE_COUNT > 64 )); then
                  PRIORITY=0
                fi

                printf "%d|%s\n" "$PRIORITY" "$MD_FILE"
              done | sort -n | cut -d'|' -f2- | while IFS= read -r MD_FILE; do

                BASENAME="$(basename "$MD_FILE" .md)"
                {
                  echo "# $BASENAME"
                  echo
                  cat "$MD_FILE"
                  echo
                } >> "$ALL_MD"

              done

              git add -f "$ALL_MD" || true
              git commit -m "[bot] $ALL_MD" || true
            done
          done

          for BASE_DIR in "$COMMUNITY_DIR" "$OFFICIAL_DIR"; do
            for file in "$BASE_DIR"/*.md; do
              [ -e "$file" ] || continue

              filename=$(basename "$file")
              out="$BASE_DIR/safe-$filename"

              if [[ "$filename" == safe-* ]]; then
                continue
              fi

              sed -E '/\|[[:space:]]*[1-9][0-9]*[[:space:]]*\|$/d' \
                "$file" > "$out"

              git add -f "$out" || true
              git commit -m "[bot] $out" || true
            done
          done

          git push --set-upstream origin "$BRANCH_NAME" || true

      - name: Create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH_NAME" \
            --title "[bot] ${{ github.workflow }}" \
            --fill
