name: Generate Manifests

on:
  workflow_dispatch:
  schedule:
    - cron: "45 23 * * *"

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: generate-manifests
  cancel-in-progress: true

env:
  CURATED_DIR: curated
  OFFICIAL_DIR: official

jobs:
  prepare:
    name: Prepare Branch
    runs-on: ubuntu-slim
    outputs:
      branch: ${{ steps.vars.outputs.branch }}
    steps:
      - id: vars
        run: |
          echo "branch=bot/refresh-manifests-${{ github.run_id }}-${{ github.run_attempt }}" >> "$GITHUB_OUTPUT"

  generate:
    name: "${{ matrix.url }}"
    runs-on: ubuntu-slim
    timeout-minutes: 10
    needs: prepare
    strategy:
      max-parallel: 2   # To avoid GitHub API rate limit
      fail-fast: true

      # DO NOT forget to update url prefixes list
      # NOTE: 'https://github.com/' is prepended if not starting with 'https://'
      matrix:
        url:
          - anthropics/skills/tree/main/skills
          - github/awesome-copilot/tree/main/agents
          - github/awesome-copilot/tree/main/skills
          - dotnet/skills/tree/main/plugins/dotnet/skills
          - dotnet/skills/tree/main/plugins/dotnet-diag/agents
          - dotnet/skills/tree/main/plugins/dotnet-diag/skills
          - dotnet/skills/tree/main/plugins/dotnet-test/agents
          - dotnet/skills/tree/main/plugins/dotnet-test/skills
          - garrytan/gstack
          - mattpocock/skills
          - obra/superpowers/tree/main/agents
          - obra/superpowers/tree/main/skills
          - addyosmani/agent-skills/tree/main/agents
          - addyosmani/agent-skills/tree/main/skills
          - nextlevelbuilder/ui-ux-pro-max-skill/tree/main/.claude/skills
          - ComposioHQ/awesome-claude-skills/tree/master
          - runceel/ai-dev-template/tree/main/.github/skills
          - runceel/ai-dev-template/tree/main/.github/agents
          - vercel-labs/agent-skills/tree/main/skills
          - openai/skills/tree/main/skills/.curated
          - Kotlin/kotlin-agent-skills/tree/main/skills
          - figma/mcp-server-guide/tree/main/skills
          - cloudflare/skills/tree/main/skills
          - browser-use/browser-use/tree/main/skills
          - firebase/agent-skills/tree/main/skills
          - facebook/react/tree/main/.claude/skills
          - google-gemini/gemini-cli/tree/main/.gemini/skills
          - google-labs-code/stitch-skills/tree/main/skills
          - google-labs-code/design.md/tree/main/examples
          - VoltAgent/awesome-design-md/tree/ef729b271802ce7ed50f9e0928137b18942cde80/design-md
          - kzhrknt/awesome-design-md-jp/tree/main/design-md
          - android/skills
          ##- sator-imaging/suggest-skills/tree/main/Unity
    env:
      # DO NOT forget add '/' at the end
      OFFICIAL_URL_PREFIXES: |
        anthropics/
        github/
        dotnet/
        vercel-labs/
        openai/
        Kotlin/
        figma/
        cloudflare/
        browser-use/
        firebase/
        facebook/
        google-gemini/
        google-labs-code/
        android/
      RECURSIVE_URL_PREFIXES: |
        android/
      GENERATED_DIR: generate/${{ strategy.job-index }}
      BRANCH: ${{ needs.prepare.outputs.branch }}

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Switch to target branch
        run: |
          set -euo pipefail

          git fetch origin "$BRANCH" || true

          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -B "$BRANCH"
          fi

      - name: Generate and classify manifest files
        env:
          CURATED_DIR: ${{ env.CURATED_DIR }}
          GITHUB_PAT: ${{ secrets.GITHUB_PAT || github.token }}
          OFFICIAL_DIR: ${{ env.OFFICIAL_DIR }}
          OFFICIAL_URL_PREFIXES: ${{ env.OFFICIAL_URL_PREFIXES }}
          RECURSIVE_URL_PREFIXES: ${{ env.RECURSIVE_URL_PREFIXES }}
          SOURCE_URL: ${{ matrix.url }}
          WORKDIR: ${{ runner.temp }}/${{ env.GENERATED_DIR }}
        run: |
          set -euo pipefail

          rm -rf "$WORKDIR"
          mkdir -p "$WORKDIR"
          cd "$WORKDIR"

          raw_source_url="$SOURCE_URL"

          if [[ "$SOURCE_URL" != https://* ]]; then
            SOURCE_URL="https://github.com/$SOURCE_URL"
          fi

          generate_args=(--generate "$SOURCE_URL")
          while IFS= read -r prefix; do
            [[ -n "$prefix" ]] || continue
            if [[ "$raw_source_url" == "$prefix"* ]]; then
              generate_args=(--recursive "${generate_args[@]}")
              break
            fi
          done <<< "$RECURSIVE_URL_PREFIXES"

          bun "$GITHUB_WORKSPACE/src/index.ts" "${generate_args[@]}"

          output_root="$CURATED_DIR"
          while IFS= read -r prefix; do
            [[ -n "$prefix" ]] || continue
            if [[ "$raw_source_url" == "$prefix"* ]]; then
              output_root="$OFFICIAL_DIR"
              break
            fi
          done <<< "$OFFICIAL_URL_PREFIXES"

          mkdir -p "$output_root"/agents
          mkdir -p "$output_root"/skills
          mkdir -p "$output_root"/designs
          shopt -s nullglob
          mv ./*.agents.md "$output_root"/agents/ || true
          mv ./*.skills.md "$output_root"/skills/ || true
          mv ./*.designs.md "$output_root"/designs/ || true
          shopt -u nullglob

      - name: Update repository files
        env:
          WORKDIR: ${{ runner.temp }}/${{ env.GENERATED_DIR }}
        run: |
          set -euo pipefail

          mkdir -p "$CURATED_DIR"/agents
          mkdir -p "$CURATED_DIR"/skills
          mkdir -p "$CURATED_DIR"/designs
          mkdir -p "$OFFICIAL_DIR"/agents
          mkdir -p "$OFFICIAL_DIR"/skills
          mkdir -p "$OFFICIAL_DIR"/designs

          cp -R "$WORKDIR"/"$CURATED_DIR"/. "$CURATED_DIR"/ 2>/dev/null || true
          cp -R "$WORKDIR"/"$OFFICIAL_DIR"/. "$OFFICIAL_DIR"/ 2>/dev/null || true

      - name: Commit and push with retry
        run: |
          set -euo pipefail

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -f "$CURATED_DIR"/agents
          git add -f "$CURATED_DIR"/skills
          git add -f "$CURATED_DIR"/designs
          git add -f "$OFFICIAL_DIR"/agents
          git add -f "$OFFICIAL_DIR"/skills
          git add -f "$OFFICIAL_DIR"/designs

          git commit -m "bot: Refresh manifests for ${{ matrix.url }}" || {
            echo "No changes to commit."
            exit 0
          }

          for i in 1 2 3 4 5; do
            git fetch origin "$BRANCH" || true

            if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
              git rebase "origin/$BRANCH"
            fi

            if git push --set-upstream origin "$BRANCH"; then
              exit 0
            fi

            git rebase --abort || true
            sleep $((i * 2))
          done

          exit 1

  collect-and-pr:
    name: Collect and Create PR
    runs-on: ubuntu-slim
    needs:
      - prepare
      - generate

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.branch }}

      - name: Create pull request with gh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          title="bot: Refresh Manifests"
          body="This PR refreshes manifest files from the configured external repositories."

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin "${{ needs.prepare.outputs.branch }}"
          git checkout -B "${{ needs.prepare.outputs.branch }}" "origin/${{ needs.prepare.outputs.branch }}"
          gh pr create \
            --base main \
            --head "${{ needs.prepare.outputs.branch }}" \
            --fill
