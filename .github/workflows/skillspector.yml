name: SkillSpector Scan

on:
  push:
    branches: [ main ]
    paths: [ '**/skills/ALL.md' ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  skillspector-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: pip install uv
      - run: bun install --frozen-lockfile

      - name: Clone & install NVIDIA/skillspector
        run: |
          git clone --depth=1 https://github.com/NVIDIA/skillspector.git .skillspector
          make -C .skillspector install
          echo "${{ github.workspace }}/.skillspector/.venv/bin" >> $GITHUB_PATH

      - name: Run SkillSpector scan and create PR with updated ALL.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="bot/${{ github.job }}"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          bun eng/skillspector.ts \
            --sarif  skillspector.sarif \
            --markdown skillspector-report.md \
            --no-llm

          git add '**/ALL.md'
          git commit -m "[bot] Update Security Risk scores in ALL.md"
          git push -u origin "$BRANCH"

          gh pr create \
            --base main \
            --head "$BRANCH" \
            --fill \
            || echo "::warning title=PR already exists::Skipped"

      - name: Post markdown to step summary
        if: always()
        run: |
          cat skillspector-report.md >> $GITHUB_STEP_SUMMARY || true

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
        if: always() && hashFiles('skillspector.sarif') != ''
