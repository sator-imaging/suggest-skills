name: SkillSpector Scan

on:
  #push:
  #  branches: [ main ]
  #  paths: [ '**/skills/*.md' ]
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        type: string

permissions:
  contents: write
  pull-requests: write
  security-events: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:

  skillspector-scan:
    timeout-minutes: 60

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv

      - name: Install NVIDIA/skillspector
        run: |
          git clone --depth=1 https://github.com/NVIDIA/skillspector.git .skillspector
          make -C .skillspector install
          echo "${{ github.workspace }}/.skillspector/.venv/bin" >> $GITHUB_PATH

      - name: Target branch
        run: |
          TARGET="${{ inputs.branch }}"

          if [ -n "$TARGET" ]; then
            echo "BRANCH=$TARGET" >> $GITHUB_ENV
          else
            echo "BRANCH=bot/${{ github.job }}" >> $GITHUB_ENV
          fi

      - name: Branch setup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

          git pull

      - name: Cleanup Branch
        if: |
          !inputs.branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"
          git clean -fd

      - name: Run SkillSpector scan
        run: |
          bun eng/skillspector.ts \
            --sarif  skillspector.sarif \
            --markdown skillspector-report.md \
            --no-llm \
            --target '**/skills/*.md'

          git add -f '**/*.md'
          git commit -m "[bot] Update Security Risk scores"
          git push -u origin "$BRANCH"

      - name: Create PR
        if: |
          !inputs.branch
        run: |
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --fill \
            || echo "::warning title=PR already exists::Skipped"

      - name: Post markdown to step summary
        if: always()
        run: |
          cat skillspector-report.md >> $GITHUB_STEP_SUMMARY || true

      #- name: Upload SARIF to GitHub Security
      #  uses: github/codeql-action/upload-sarif@v3
      #  with:
      #    sarif_file: skillspector.sarif
      #  if: always() && hashFiles('skillspector.sarif') != ''
