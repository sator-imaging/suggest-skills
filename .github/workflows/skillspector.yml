name: SkillSpector Scan

on:
  #push:
  #  branches: [ main ]
  #  paths: [ '**/skills/*.md' ]
  workflow_dispatch:
  workflow_call:
    inputs:
      branch:
        type: string

permissions:
  contents: write
  pull-requests: write
  security-events: write

env:
  GH_TOKEN: ${{ github.token }}

jobs:

  skillspector:
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        base_dir:
          - community
          - official

    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install uv

      - name: Install NVIDIA/skillspector
        run: |
          git clone --depth=1 https://github.com/NVIDIA/skillspector.git .skillspector
          make -C .skillspector install
          echo "${{ github.workspace }}/.skillspector/.venv/bin" >> $GITHUB_PATH

      - name: Target branch
        run: |
          TARGET="${{ inputs.branch }}"

          if [ -n "$TARGET" ]; then
            echo "BRANCH=$TARGET" >> $GITHUB_ENV
          else
            echo "BRANCH=bot/${{ github.job }}" >> $GITHUB_ENV
          fi

      - name: Branch setup
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # If remote branch exists → track it
          git fetch origin
          if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
            git checkout -B "$BRANCH" "origin/$BRANCH"
            git pull
          else
            git checkout -b "$BRANCH"
          fi

      - name: Cleanup Branch
        if: |
          !inputs.branch
        run: |
          git fetch origin "${{ github.ref_name }}"
          git reset --hard "origin/${{ github.ref_name }}"
          git clean -fd

      - name: Run SkillSpector scan
        run: |
          # No SARIF export (thousands of errors/warns): --sarif  skillspector.sarif \
          bun eng/skillspector.ts \
            --markdown "skillspector-report.md" \
            --target '${{ matrix.base_dir }}/skills/*.md'

          cat "skillspector-report.md" >> $GITHUB_STEP_SUMMARY || true

          git add -f "${{ matrix.base_dir }}"/skills/*.md
          git commit -m "[bot] Update Security Risk Scores (${{ matrix.base_dir }})"

          echo "================================"
          echo " Push to origin"
          echo "================================"

          for i in 1 2 3 4 5 6 7 8 9; do
            git fetch origin "$BRANCH" || true

            if git show-ref --verify --quiet "refs/remotes/origin/$BRANCH"; then
              git rebase "origin/$BRANCH"
            fi

            if git push --set-upstream origin "$BRANCH"; then
              exit 0
            fi

            git rebase --abort || true
            sleep $((i * 3))
          done

          exit 1

      #- name: Upload SARIF to GitHub Security
      #  uses: github/codeql-action/upload-sarif@v3
      #  with:
      #    sarif_file: skillspector.sarif
      #  if: always() && hashFiles('skillspector.sarif') != ''


  create-pr:
    needs:
      - skillspector
    if: |
      !inputs.branch &&
      always()

    runs-on: ubuntu-slim
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          ref: ${{ inputs.branch }}

      - run: |
          gh pr create \
            --base main \
            --head "${{ inputs.branch }}" \
            --fill \
            || echo "::warning title=PR already exists::Skipped"
