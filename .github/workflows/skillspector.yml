name: SkillSpector Scan

on:
  push:
    branches: [ main ]
    paths: [ '**/skills/ALL.md' ]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Clone & install NVIDIA/skillspector
        run: |
          git clone --depth=1 https://github.com/NVIDIA/skillspector.git .skillspector
          make -C .skillspector install
          echo "${{ github.workspace }}/.skillspector/.venv/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SkillSpector scan
        run: |
          bun eng/skillspector.ts \
            --sarif  skillspector.sarif \
            --markdown skillspector-report.md \
            --no-llm

      - name: Create PR with updated ALL.md
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if git diff --quiet -- '**/ALL.md'; then
            echo "No changes to ALL.md files"
            exit 0
          fi
          BRANCH="skillspector/update-security-risk"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add '**/ALL.md'
          git commit -m "chore: update Security Risk scores in ALL.md"
          git push --force origin "$BRANCH"
          gh pr create \
            --base main \
            --head "$BRANCH" \
            --title "chore: update Security Risk scores" \
            --body "Automated update of Security Risk column in ALL.md files via SkillSpector scan." \
            || gh pr edit "$BRANCH" --body "Automated update of Security Risk column in ALL.md files via SkillSpector scan."

      - name: Post markdown to step summary
        run: cat skillspector-report.md >> $GITHUB_STEP_SUMMARY || true
        if: always()

      - name: Upload markdown report
        uses: actions/upload-artifact@v7
        with:
          path: skillspector-report.md
          archive: false
        if: always() && hashFiles('skillspector-report.md') != ''

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
        if: always() && hashFiles('skillspector.sarif') != ''
