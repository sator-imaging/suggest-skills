name: SkillSpector Scan

on:
  schedule:
    - cron: "30 23 * * *"
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Run SkillSpector via eng/skillspector.sh
        run: |
          ./eng/skillspector.sh \
            --sarif  skillspector.sarif \
            --markdown skillspector-report.md \
            --no-llm

      - name: Post markdown to step summary
        run: cat skillspector-report.md >> $GITHUB_STEP_SUMMARY
        if: always()

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
        if: always() && hashFiles('skillspector.sarif') != ''
