name: SkillSpector Scan

on:
  push:
    branches: [ main ]
    paths: [ '**/skills/ALL.md' ]
  workflow_dispatch:

permissions:
  security-events: write

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install uv

      - name: Clone & install NVIDIA/skillspector
        run: |
          git clone --depth=1 https://github.com/NVIDIA/skillspector.git .skillspector
          make -C .skillspector install
          echo "${{ github.workspace }}/.skillspector/.venv/bin" >> $GITHUB_PATH

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run SkillSpector scan
        run: |
          bun eng/skillspector.ts \
            --sarif  skillspector.sarif \
            --markdown skillspector-report.md \
            --no-llm

      - name: Post markdown to step summary
        run: |
          if [ $(wc -c < skillspector-report.md) -gt 1000000 ]; then
            head -c 1000000 skillspector-report.md >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "---" >> $GITHUB_STEP_SUMMARY
            echo "⚠️ Report truncated (exceeded 1024KB limit). Full report available in workflow artifacts." >> $GITHUB_STEP_SUMMARY
          else
            cat skillspector-report.md >> $GITHUB_STEP_SUMMARY
          fi
        if: always()

      - name: Upload markdown report
        uses: actions/upload-artifact@v4
        with:
          name: skillspector-report
          path: skillspector-report.md
        if: always() && hashFiles('skillspector-report.md') != ''

      - name: Upload SARIF to GitHub Security
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: skillspector.sarif
        if: always() && hashFiles('skillspector.sarif') != ''
