name: '[push,PR] Test Coverage'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --production

      - name: Run tests with coverage
        run: |
          bun test \
            --coverage \
            --coverage-reporter=text \
            --coverage-reporter=lcov \
            > coverage.txt

      - name: Write coverage summary
        shell: bash
        run: |
          TOTAL_LINE=$(grep "^All files" coverage.txt)

          # Extract columns from bun coverage text
          # ex: All files | 91.23 | 88.10 | 90.01 | ...
          LINES=$(echo "$TOTAL_LINE" | awk -F'|' '{gsub(/ /,"",$2); print $2}')
          FUNCTIONS=$(echo "$TOTAL_LINE" | awk -F'|' '{gsub(/ /,"",$3); print $3}')
          BRANCHES=$(echo "$TOTAL_LINE" | awk -F'|' '{gsub(/ /,"",$4); print $4}')
          STATEMENTS=$(echo "$TOTAL_LINE" | awk -F'|' '{gsub(/ /,"",$5); print $5}')

          {
            echo "# Test Coverage"
            echo ""
            echo "## Summary"
            echo ""
            echo "| Metric | Coverage |"
            echo "|---|---|"
            echo "| Lines | ${LINES}% |"
            echo "| Functions | ${FUNCTIONS}% |"
            echo "| Branches | ${BRANCHES}% |"
            echo "| Statements | ${STATEMENTS}% |"
            echo ""
            echo "## Raw Output"
            echo ""
            echo '```text'
            cat coverage.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
