name: '[push,PR] Test Coverage'

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

jobs:
  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile --production

      - name: Run tests with coverage
        run: |
          bun test \
            --coverage \
            --coverage-reporter=text \
            --coverage-reporter=json \
            > coverage.json

      - name: Write coverage summary
        shell: bash
        run: |
          bun -e '
            const fs = require("fs");
            const data = JSON.parse(fs.readFileSync("coverage.json", "utf8"));
            const t = data.total;

            console.info(`\
              # 📊 Test Coverage

              | Metric     | Coverage                        |
              |:-----------|--------------------------------:|
              | Lines      | ${t.lines.pct.toFixed(2)}%      |
              | Functions  | ${t.functions.pct.toFixed(2)}%  |
              | Branches   | ${t.branches.pct.toFixed(2)}%   |
              | Statements | ${t.statements.pct.toFixed(2)}% |
            `);
          ' >> $GITHUB_STEP_SUMMARY
