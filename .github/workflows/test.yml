name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile  # Test requires dev deps
      - run: bun run test
      - run: bun run build
      - run: npm pack --dry-run >> $GITHUB_STEP_SUMMARY
