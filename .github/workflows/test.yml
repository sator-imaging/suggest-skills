name: Test

on:
  #push:
  #  branches: [ main ]
  #  paths-ignore: [ '.github/**', 'community/**', 'official/**' ]
  #pull_request:
  #  branches: [ main ]
  #  paths-ignore: [ '.github/**', 'community/**', 'official/**' ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          registry-url: ${{ env.REPOSITORY_URL }}
      - run: npm i
      - run: npm test
      - run: npm run build

      - run: npm pack --dry-run 2>> $GITHUB_STEP_SUMMARY
