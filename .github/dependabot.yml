version: 2

multi-ecosystem-groups:
  default:
    reviewers:
      - "sator-imaging"
    commit-message:
      prefix: "chore(deps)"
    labels:
      - "dependabot"
    versioning-strategy: "increase"
    schedule:
      interval: "daily"
      time: "06:00"
      timezone: "Asia/Tokyo"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
      semver-major-days: 7
      semver-minor-days: 7
      semver-patch-days: 7

updates:
  - package-ecosystem: "npm"
    multi-ecosystem-group: "default"
    directory: "/"
  - package-ecosystem: "bun"
    multi-ecosystem-group: "default"
    directory: "/"
  - package-ecosystem: "nuget"
    multi-ecosystem-group: "default"
    directory: "/"
